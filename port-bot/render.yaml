services:
  - type: web
    name: carl-portfolio-bot
    runtime: python
    buildCommand: pip install -r requirements.txt && python3 -c "import nltk; nltk.download('punkt_tab'); nltk.download('stopwords')" && python3 train.py
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT